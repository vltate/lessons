<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="css/fonts.css"/>
    <link rel="stylesheet" href="css/reset.css"/>
    <link rel="stylesheet" href="css/style.css"/>
    <title>Lesson 14</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <h1>Welcome to homework 14</h1>
      </header>

      <main class="page">
        <div class="page__container">

<div class="page__blank blank">

<form class="blank__form form" enctype="multipart/form-data" action="#" method="get">

<div class="form__fname fname">
	<label class="fname__label" for="name">Your name</label>
	<input class="fname__input" type="text" id="name" autocomplete="off" placeholder="Abc" name="name[]" required>
</div>


<div class="form__femail femail">
	<label class="femail__label" for="email">Email addres</label>
	<input class="femail__input" id="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" autocomplete="off" placeholder="Abc@def.com" name="mail" type="email" required>
</div>


<div class="form__fsubject fsubject">
	<label class="fsubject__label" for="fsubject">Subject</label>
	<input class="fsubject__input" type="text" id="fsubject" autocomplete="off" placeholder="Abc">
</div>


<div class="form__fmessage fmessage">
	<label class="fmessage__label" for="fmessage">Message</label>
	<textarea class="fmessage__input" name="Message" id="fmessage" placeholder="Hi! i’d like to ask about"></textarea>
</div>

<button class="form__btn">Sumbit</button>

</form>


<div class="blank__elemnts elements">


<h2>Size</h2>

	<div class="elements__checkbox checkbox">

	<div class="checkbox__item">
	<input class="checkbox__chinput" type="radio" id="size-l" name="size" value="L" checked>
	<label class="checkbox__chlabel" for="size-l">L</label>
</div>

<div class="checkbox__item">
	<input class="checkbox__chinput" type="radio" id="size-xl" name="size" value="XL">
	<label class="checkbox__chlabel" for="size-xl">XL</label>
</div>

<div class="checkbox__item">
	<input class="checkbox__chinput" type="radio" id="size-xs" name="size" value="XS">
	<label class="checkbox__chlabel" for="size-xs">XS</label>
</div>


	</div>

<h2>Color</h2>

	<div class="elements__radio-btn radio-btn">

		<div class="radio-btn__item">
			<input class="radio-btn__rinput" type="radio" id="purple" name="color" value="purple" checked>
			<label class="radio-btn__rlabel" for="purple"></label>
		</div>

		<div class="radio-btn__item">
			<input class="radio-btn__rinput" type="radio" id="black" name="color" value="black">
			<label class="radio-btn__rlabel" for="black"></label>
		</div>

		<div class="radio-btn__item">
			<input class="radio-btn__rinput" type="radio" id="gold" name="color" value="gold">
			<label class="radio-btn__rlabel" for="gold"></label>
		</div>

	</div>
	

</div>

</div>
</div>


      </main>

      <footer class="footer">FOOTER</footer>
    </div>
  </body>
</html>
