      <main class="page">
        <div class="page__container">

<div class="page__blank blank">

<form class="blank__form form" enctype="multipart/form-data" action="#" method="get">

	<label for="name">Your name</label>
	<input type="text" id="name" autocomplete="off" placeholder="Abc" name="name[]" required>
</div>


<div class="form__femail">
	<label  for="email">Email addres</label>
	<input  id="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" autocomplete="off" placeholder="Введіть ваш E-mail" name="mail" type="email">
</div>


<div class="form__fsubject">
	<label  for="name">Subject</label>
	<input type="text" id="name" autocomplete="off" placeholder="Abc">
</div>


<div class="form__fmessage fmessage">
	<label  for="name">Message</label>
	<textarea class="fmessage__item" name="Message" id="message" placeholder="Hi! i’d like to ask about"></textarea>
</div>

<a href="#">123</a>

</div>
</div>


        </div>
